# R66S ImageBuilder 配置文件
# 此文件定义了 R66S 设备的基础配置

# 设备信息
DEVICE_NAME="FastRhino R66S"
DEVICE_ARCH="rockchip/armv8"
DEVICE_CPU="RK3568"

# 默认网络配置
DEFAULT_IP="192.168.100.1"
DEFAULT_NETMASK="255.255.255.0"
DEFAULT_GATEWAY="192.168.100.1"

# 默认用户配置
DEFAULT_USERNAME="root"
DEFAULT_PASSWORD="password"

# 固件配置
DEFAULT_ROOTFS_SIZE="1024"
DEFAULT_KERNEL_PARTSIZE="64"

# 支持的 ImmortalWrt 版本
SUPPORTED_VERSIONS="24.10 23.05"

# 版本对应的 Profile 名称
PROFILE_24_10="lunzn_fastrhino-r66s"
PROFILE_23_05="lunzn_fastrhino-r66s"

# 版本对应的 Docker 标签
DOCKER_TAG_24_10="rockchip-armv8-openwrt-24.10.2"
DOCKER_TAG_23_05="rockchip-armv8-openwrt-23.05"

# 基础必需包 (不可删除)
ESSENTIAL_PACKAGES="base-files busybox ca-bundle dropbear firewall4 fstools"
ESSENTIAL_PACKAGES="$ESSENTIAL_PACKAGES kmod-gpio-button-hotplug kmod-nft-offload"
ESSENTIAL_PACKAGES="$ESSENTIAL_PACKAGES libc libgcc libustream-mbedtls logd mtd netifd"
ESSENTIAL_PACKAGES="$ESSENTIAL_PACKAGES nftables odhcp6c odhcpd-ipv6only opkg ppp"
ESSENTIAL_PACKAGES="$ESSENTIAL_PACKAGES ppp-mod-pppoe procd procd-seccomp procd-ujail"
ESSENTIAL_PACKAGES="$ESSENTIAL_PACKAGES uci uclient-fetch urandom-seed urngd"

# LuCI 基础包
LUCI_BASE_PACKAGES="luci luci-ssl-openssl luci-theme-bootstrap"

# 推荐的基础工具包
RECOMMENDED_PACKAGES="curl wget nano htop iperf3 tcpdump ethtool"
RECOMMENDED_PACKAGES="$RECOMMENDED_PACKAGES kmod-usb-storage kmod-usb2 kmod-usb3 block-mount"

# 网络工具包
NETWORK_PACKAGES="iptables-mod-tproxy iptables-mod-extra ipset"
NETWORK_PACKAGES="$NETWORK_PACKAGES kmod-ipt-nat kmod-ipt-nat6 kmod-ipt-conntrack"

# 主题包
THEME_PACKAGES="luci-theme-argon"

# 系统管理包
SYSTEM_PACKAGES="luci-app-ttyd ttyd luci-app-autoreboot luci-app-filetransfer"

# 网络服务包
SERVICE_PACKAGES="luci-app-upnp miniupnpd luci-app-ddns ddns-scripts"

# 默认网络代理包 (固定包含)
DEFAULT_PROXY_PACKAGES="luci-app-passwall luci-app-openclash"
DEFAULT_PROXY_PACKAGES="$DEFAULT_PROXY_PACKAGES xray-core v2ray-geoip v2ray-geosite"
DEFAULT_PROXY_PACKAGES="$DEFAULT_PROXY_PACKAGES shadowsocks-libev-ss-local shadowsocks-libev-ss-redir"
DEFAULT_PROXY_PACKAGES="$DEFAULT_PROXY_PACKAGES simple-obfs v2ray-plugin"
DEFAULT_PROXY_PACKAGES="$DEFAULT_PROXY_PACKAGES coreutils-nohup bash dnsmasq-full"
DEFAULT_PROXY_PACKAGES="$DEFAULT_PROXY_PACKAGES libcap libcap-bin ruby ruby-yaml kmod-tun"

# 默认 DNS 服务包 (固定包含)
DEFAULT_DNS_PACKAGES="luci-app-adguardhome adguardhome luci-app-mosdns mosdns"