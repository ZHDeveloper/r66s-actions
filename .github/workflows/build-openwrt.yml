name: Build OpenWrt for R66S

on:
  repository_dispatch:
  workflow_dispatch:
  watch:
    types: [started]
    inputs:
      upload_release:
        description: 'Upload to release'
        required: false
        default: true
        type: boolean
  schedule:
    - cron: 0 8 * * 0

env:
  TZ: Asia/Shanghai
  UPLOAD_RELEASE: ${{ github.event.inputs.upload_release || true }}
  TOOLCHAIN_TAG: toolchain

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ImmortalWrt
            repo_url: https://github.com/immortalwrt/immortalwrt
            repo_branch: openwrt-23.05
            config_file: configs/r66s-imm.config
          - name: LEDE
            repo_url: https://github.com/coolsnowwolf/lede
            repo_branch: master
            config_file: configs/r66s-lede.config

    env:
      CONFIG_FILE: ${{ matrix.config_file }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        docker rmi $(docker images -q)
        sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
        sudo swapoff -a && sudo rm -f /swapfile /mnt/swapfile
        sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
        (sudo -E apt-get -y update
        sudo -E apt-get -y install clang rename $(curl -fsSL is.gd/depends_ubuntu_2204)
        sudo -E systemctl daemon-reload
        sudo -E apt-get -y autoremove --purge
        sudo -E apt-get -y clean) &
        sudo timedatectl set-timezone "$TZ"

    - name: Combine Disks
      run: |
        MNT_SIZE=$((($(df --block-size=1024 --output=avail /mnt | tail -1) - 1024*1024*1) * 1024))
        sudo fallocate -l $MNT_SIZE /mnt/mnt.img
        MNT_NAME=$(sudo losetup -Pf --show /mnt/mnt.img)
        sudo pvcreate -f $MNT_NAME
        ROOT_SIZE=$((($(df --block-size=1024 --output=avail / | tail -1) - 1024*1024*4) * 1024))
        sudo fallocate -l $ROOT_SIZE /root.img
        ROOT_NAME=$(sudo losetup -Pf --show /root.img)
        sudo pvcreate -f $ROOT_NAME
        sudo vgcreate actions $MNT_NAME $ROOT_NAME
        sudo lvcreate -n disk -l 100%FREE actions
        LV_NAME=$(sudo lvscan | awk -F "'" '{print $2}')
        sudo mkfs.btrfs -L combinedisk $LV_NAME
        sudo mkdir -p /workdir
        sudo mount -o compress=zstd $LV_NAME /workdir
        sudo chown -R runner:runner /workdir && df -hT

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone ${{ matrix.repo_url }} -b ${{ matrix.repo_branch }} openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        find openwrt/files -name "auto-expand-overlay" -type f -exec chmod +x {} \; 2>/dev/null || true
        chmod +x scripts/*.sh
        cd openwrt
        $GITHUB_WORKSPACE/scripts/download-custom-packages.sh
        $GITHUB_WORKSPACE/scripts/download-cores.sh
        $GITHUB_WORKSPACE/scripts/diy.sh

        # Set toolchain variables (for future use if needed)

        # Check if toolchain needs rebuild
        # Create unique toolchain filename based on source repo and branch
        REPO_NAME=$(echo "${{ matrix.repo_url }}" | sed 's|.*/||' | sed 's|\.git||')
        BRANCH_SAFE=$(echo "${{ matrix.repo_branch }}" | sed 's|/|-|g')
        TOOLCHAIN_FILE="${REPO_NAME}-${BRANCH_SAFE}-rockchip-toolchain.tar.gz"

        if curl -s -f -I "https://github.com/${{ github.repository }}/releases/download/toolchain/$TOOLCHAIN_FILE" > /dev/null; then
          echo "REBUILD_TOOLCHAIN=false" >> $GITHUB_ENV
          echo "TOOLCHAIN_FILE=$TOOLCHAIN_FILE" >> $GITHUB_ENV
        else
          echo "REBUILD_TOOLCHAIN=true" >> $GITHUB_ENV
          echo "TOOLCHAIN_FILE=$TOOLCHAIN_FILE" >> $GITHUB_ENV
        fi

    - name: Download Toolchain
      if: env.REBUILD_TOOLCHAIN == 'false'
      run: |
        cd openwrt
        wget -q https://github.com/${{ github.repository }}/releases/download/${{ env.TOOLCHAIN_TAG }}/${{ env.TOOLCHAIN_FILE }}
        tar -xf ${{ env.TOOLCHAIN_FILE }} --strip-components=1
        rm -f ${{ env.TOOLCHAIN_FILE }}

    - name: Compile Toolchain
      if: env.REBUILD_TOOLCHAIN == 'true'
      id: toolchain
      run: |
        cd openwrt
        # Ensure config is properly set before toolchain compilation
        make defconfig
        make toolchain/compile -j$(nproc) || make toolchain/compile -j1 V=s

        # Package toolchain
        tar -czf ../${{ env.TOOLCHAIN_FILE }} staging_dir build_dir/host build_dir/toolchain-* dl/toolchain-*
        mkdir -p $GITHUB_WORKSPACE/output
        mv ../${{ env.TOOLCHAIN_FILE }} $GITHUB_WORKSPACE/output/

    - name: Delete Old Toolchain
      if: steps.toolchain.conclusion == 'success'
      uses: mknejp/delete-release-assets@v1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag: ${{ env.TOOLCHAIN_TAG }}
        assets: '${{ env.TOOLCHAIN_FILE }}'
        fail-if-no-assets: false
        fail-if-no-release: false

    - name: Upload Toolchain To Release
      if: steps.toolchain.conclusion == 'success'
      uses: softprops/action-gh-release@v2
      with:
        name: toolchain-cache
        tag_name: ${{ env.TOOLCHAIN_TAG }}
        token: ${{ secrets.GITHUB_TOKEN }}
        files: output/*
        body: OpenWrt 工具链缓存

    - name: Download package
      id: package
      run: |
        cd openwrt
        # make download -j8
        make package/download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Generate release tag
      id: tag
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
      run: |
        RELEASE_TAG="${{ matrix.name }}_R66S"
        echo "release_tag=${RELEASE_TAG}" >> $GITHUB_OUTPUT
        touch release.txt
        echo "📦 ${{ matrix.name }} R66S 固件" >> release.txt
        echo "🕐 编译时间: $(date '+%Y-%m-%d %H:%M:%S')" >> release.txt
        echo "🌿 源码分支: ${{ matrix.repo_branch }}" >> release.txt
        echo "🎯 支持设备: FastRhino R66S (RK3568)" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: Cleanup
      if: always()
      run: |
        # Delete old workflow runs for this workflow only
        gh run list --workflow="build-openwrt.yml" --limit 50 --json databaseId --jq '.[10:][].databaseId' | xargs -I {} gh run delete {} || true

        # Delete failed and cancelled workflow runs
        gh run list --workflow="build-openwrt.yml" --status failure --limit 20 --json databaseId --jq '.[].databaseId' | xargs -I {} gh run delete {} || true
        gh run list --workflow="build-openwrt.yml" --status cancelled --limit 20 --json databaseId --jq '.[].databaseId' | xargs -I {} gh run delete {} || true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}